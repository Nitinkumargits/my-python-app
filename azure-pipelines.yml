trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:

- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.11'

- script: |
    pip install -r requirements.txt
  displayName: Install

- script: |
    pytest
  displayName: Run Tests

- script: |
    zip -r app.zip .
  displayName: Build

- publish: app.zip
  artifact: drop